services:
  - type: web
    name: affiliate-app
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn app:app --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: affiliate-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: affiliate-db
    plan: free
